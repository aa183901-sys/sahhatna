<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صحتنا - اتصل بنا</title>
  <meta name="description" content="تواصل مع فريق صحتنا لأي استفسار أو اقتراح" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { DEFAULT: '#0d9488', dark: '#0f766e', light: '#14b8a6', lighter: '#ccfbf1' } }, fontFamily: { sans: ['Cairo', 'Tajawal', 'system-ui', 'sans-serif'] } } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d9488'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial'%3E+%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d9488" />
</head>
<body class="min-h-screen">

  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white text-xl font-bold">+</div>
          <div><h1 class="text-xl font-bold text-gray-800">صحتنا</h1><p class="text-xs text-gray-500 -mt-1">اتصل بنا</p></div>
        </a>
        <a href="index.html" class="text-sm text-gray-500 hover:text-primary font-medium">← العودة للرئيسية</a>
      </div>
    </div>
  </header>

  <section class="max-w-2xl mx-auto px-4 sm:px-6 py-12">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary-lighter text-primary rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">📞</div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">اتصل بنا</h1>
      <p class="text-gray-500">نحن هنا لمساعدتك. تواصل معنا في أي وقت</p>
    </div>

    <div class="grid md:grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-2xl shadow-sm p-6 text-center">
        <div class="text-3xl mb-2">📧</div>
        <h3 class="font-bold text-gray-800 mb-1">البريد الإلكتروني</h3>
        <p class="text-sm text-primary">info@sahatna.app</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-6 text-center">
        <div class="text-3xl mb-2">📱</div>
        <h3 class="font-bold text-gray-800 mb-1">واتساب</h3>
        <p class="text-sm text-primary">0770 000 0000</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-6 text-center">
        <div class="text-3xl mb-2">📍</div>
        <h3 class="font-bold text-gray-800 mb-1">الموقع</h3>
        <p class="text-sm text-gray-500">بغداد، العراق</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-xl font-bold text-gray-800 mb-4">أرسل رسالة</h2>
      <form onsubmit="event.preventDefault(); showToast('تم إرسال رسالتك بنجاح! سنرد عليك قريباً.', 'success'); this.reset();" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">الاسم الكامل *</label>
          <input type="text" required placeholder="اسمك الكامل" class="form-input" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">البريد الإلكتروني *</label>
          <input type="email" required placeholder="example@email.com" class="form-input" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">الموضوع</label>
          <input type="text" placeholder="موضوع الرسالة" class="form-input" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">الرسالة *</label>
          <textarea required rows="5" placeholder="اكتب رسالتك هنا..." class="form-input"></textarea>
        </div>
        <button type="submit" class="btn-primary w-full">إرسال الرسالة</button>
      </form>
    </div>
  </section>

  <footer class="bg-gray-800 text-gray-300 py-6 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-sm">
      © 2025 صحتنا — جميع الحقوق محفوظة. صُنع للعراق 🇮🇶
    </div>
  </footer>

  <div id="toastContainer"></div>
  <script>
    function showToast(msg, type) {
      var t = document.createElement('div');
      t.className = 'toast toast-' + (type || 'success');
      t.textContent = msg;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
    }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function() {}); }
  </script>
</body>
</html>
