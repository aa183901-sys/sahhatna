<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صحتنا - حجوزاتي</title>
  <meta name="description" content="عرض وإدارة حجوزاتك الطبية" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: { DEFAULT: '#0d9488', dark: '#0f766e', light: '#14b8a6', lighter: '#ccfbf1' } }, fontFamily: { sans: ['Cairo', 'Tajawal', 'system-ui', 'sans-serif'] } } } };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d9488'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial'%3E+%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d9488" />
</head>
<body class="min-h-screen bg-gray-50">

  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white text-xl font-bold">+</div>
          <div><h1 class="text-xl font-bold text-gray-800">صحتنا</h1><p class="text-xs text-gray-500 -mt-1">حجوزاتي</p></div>
        </a>
        <a href="index.html" class="text-sm text-gray-500 hover:text-primary font-medium">← العودة للرئيسية</a>
      </div>
    </div>
  </header>

  <!-- ===== Login Section ===== -->
  <div id="loginSection" class="min-h-[60vh] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-primary-lighter text-primary rounded-2xl flex items-center justify-center text-3xl mx-auto mb-3">📋</div>
        <h2 class="text-2xl font-bold text-gray-800">حجوزاتي</h2>
        <p class="text-gray-500 mt-1">أدخل رقم الهاتف ورقم الحجز لحماية بياناتك</p>
      </div>
      <form onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">رقم الهاتف</label>
          <input type="tel" id="loginPhone" required placeholder="07XX XXX XXXX" inputmode="numeric" class="form-input" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">رقم الحجز</label>
          <input type="text" id="loginBookingId" required placeholder="الصق رقم الحجز الظاهر بعد التأكيد" class="form-input" dir="ltr" />
          <p class="text-xs text-gray-400 mt-1">رقم الهاتف وحده لا يكفي للوصول إلى بيانات الحجز</p>
        </div>
        <button type="submit" class="btn-primary w-full">عرض حجوزاتي</button>
      </form>
    </div>
  </div>

  <!-- ===== Bookings Section ===== -->
  <div id="bookingsSection" class="hidden max-w-4xl mx-auto px-4 sm:px-6 py-6">
    <!-- Phone display + logout -->
    <div class="flex items-center justify-between mb-6">
      <p id="phoneDisplay" class="text-sm font-semibold text-gray-600"></p>
      <button onclick="logout()" class="text-sm text-gray-400 hover:text-danger">خروج</button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="stat-card text-center">
        <p class="text-2xl font-bold text-primary" id="statUpcoming">0</p>
        <p class="text-xs text-gray-400">قادمة</p>
      </div>
      <div class="stat-card text-center">
        <p class="text-2xl font-bold text-success" id="statCompleted">0</p>
        <p class="text-xs text-gray-400">مكتملة</p>
      </div>
      <div class="stat-card text-center">
        <p class="text-2xl font-bold text-danger" id="statCancelled">0</p>
        <p class="text-xs text-gray-400">ملغاة</p>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-4 overflow-x-auto scrollbar-hide">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">الكل</button>
      <button class="filter-tab" data-filter="upcoming" onclick="setFilter('upcoming')">قادمة</button>
      <button class="filter-tab" data-filter="completed" onclick="setFilter('completed')">مكتملة</button>
      <button class="filter-tab" data-filter="cancelled" onclick="setFilter('cancelled')">ملغاة</button>
    </div>

    <!-- Bookings list -->
    <div id="bookingsList" class="space-y-3"></div>
  </div>

  <!-- Review Modal -->
  <div id="reviewModal" class="hidden"></div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <!-- Scripts -->
  <script src="js/runtime-config.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/my-bookings.js"></script>

  <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function() {}); }</script>
</body>
</html>
