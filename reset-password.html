<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>صحتنا - تغيير كلمة المرور</title>
  <link rel="stylesheet" href="css/tailwind.generated.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <meta name="theme-color" content="#0d9488" />
</head>
<body class="bg-gray-50 min-h-screen">
  <main class="min-h-screen flex items-center justify-center p-4">
    <section class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 max-w-md w-full">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center text-white text-3xl font-bold mx-auto mb-3">+</div>
        <h1 class="text-2xl font-bold text-gray-800">تغيير كلمة المرور</h1>
        <p class="text-gray-500 mt-1">اختر كلمة مرور جديدة لحساب الإدارة</p>
      </div>

      <div id="recoveryStatus" class="rounded-xl bg-info-light text-gray-700 p-4 text-sm text-center" aria-live="polite">
        جارٍ التحقق من رابط الاستعادة...
      </div>

      <form id="resetPasswordForm" onsubmit="handlePasswordUpdate(event)" class="space-y-4 hidden mt-5">
        <div>
          <label for="newPassword" class="block text-sm font-semibold text-gray-600 mb-1">كلمة المرور الجديدة</label>
          <input type="password" id="newPassword" required minlength="12" autocomplete="new-password" class="form-input" />
          <p class="text-xs text-gray-400 mt-1">استخدم 12 حرفاً على الأقل مع أرقام ورموز.</p>
        </div>
        <div>
          <label for="confirmPassword" class="block text-sm font-semibold text-gray-600 mb-1">تأكيد كلمة المرور</label>
          <input type="password" id="confirmPassword" required minlength="12" autocomplete="new-password" class="form-input" />
        </div>
        <button id="updatePasswordButton" type="submit" class="btn-primary w-full">حفظ كلمة المرور</button>
      </form>

      <div class="mt-5 text-center">
        <a href="admin.html" class="text-sm text-primary hover:underline">العودة إلى تسجيل الدخول</a>
      </div>
    </section>
  </main>

  <div id="toastContainer"></div>
  <script src="js/runtime-config.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
